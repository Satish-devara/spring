<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form action="/webContent/register" method="POST">
        <label>ID:</label><br>
        <input type="number" name="studentId" required><br><br>

        <label>Name:</label><br>
        <input type="text" name="studentName" required><br><br>

        <label>Age:</label><br>
        <input type="number" name="studentAge" required><br><br>

        <label>City:</label><br>
        <input type="text" name="studentCity" required><br><br>

        <input type="submit" value="Register Student">
    </form>
</body>
</html>
